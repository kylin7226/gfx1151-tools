<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#info {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  color: #fff; font-family: monospace; font-size: 14px;
  background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 4px;
  pointer-events: none; user-select: none;
}
</style>
</head>
<body>
<div id="info">Click to lock mouse &bull; WASD to move &bull; Mouse to look</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const WORLD_SIZE = 16;
  const BLOCK_SIZE = 1;

  // --- Scene Setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // --- Lighting ---
  const ambientLight = new THREE.AmbientLight(0x6688aa, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffeedd, 0.9);
  dirLight.position.set(20, 30, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 80;
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -20;
  scene.add(dirLight);

  const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x444422, 0.3);
  scene.add(hemiLight);

  // --- Height Function ---
  function getHeight(x, z) {
    const h1 = Math.sin(x * 0.3) * Math.cos(z * 0.3) * 2.5;
    const h2 = Math.sin(x * 0.15 + z * 0.1) * 3.0;
    const h3 = Math.cos(x * 0.5 - z * 0.2) * 1.0;
    const h4 = Math.sin((x + z) * 0.08) * 2.0;
    return Math.floor(h1 + h2 + h3 + h4 + 5);
  }

  // --- Materials ---
  const grassMat = new THREE.MeshLambertMaterial({ color: 0x55aa33 });
  const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const stoneMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const waterMat = new THREE.MeshLambertMaterial({ color: 0x3366aa, transparent: true, opacity: 0.7 });

  const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

  // --- Build Terrain ---
  const grassMesh = new THREE.InstancedMesh(blockGeo, grassMat, WORLD_SIZE * WORLD_SIZE);
  const dirtMesh = new THREE.InstancedMesh(blockGeo, dirtMat, WORLD_SIZE * WORLD_SIZE * 8);
  const stoneMesh = new THREE.InstancedMesh(blockGeo, stoneMat, WORLD_SIZE * WORLD_SIZE * 8);
  const waterMesh = new THREE.InstancedMesh(blockGeo, waterMat, WORLD_SIZE * WORLD_SIZE);

  grassMesh.castShadow = true;
  grassMesh.receiveShadow = true;
  dirtMesh.castShadow = true;
  dirtMesh.receiveShadow = true;
  stoneMesh.castShadow = true;
  stoneMesh.receiveShadow = true;

  const dummy = new THREE.Object3D();
  let grassCount = 0, dirtCount = 0, stoneCount = 0, waterCount = 0;

  for (let x = 0; x < WORLD_SIZE; x++) {
    for (let z = 0; z < WORLD_SIZE; z++) {
      const h = getHeight(x, z);
      const waterLevel = 3;

      for (let y = 0; y < h; y++) {
        let mat;
        if (y === h - 1) {
          mat = grassMat;
        } else if (y >= h - 3) {
          mat = dirtMat;
        } else {
          mat = stoneMat;
        }

        dummy.position.set(x, y, z);
        dummy.updateMatrix();

        if (mat === grassMat) {
          grassMesh.setMatrixAt(grassCount++, dummy.matrix);
        } else if (mat === dirtMat) {
          dirtMesh.setMatrixAt(dirtCount++, dummy.matrix);
        } else {
          stoneMesh.setMatrixAt(stoneCount++, dummy.matrix);
        }
      }

      // Water fill for low areas
      if (h < waterLevel) {
        for (let y = h; y < waterLevel; y++) {
          dummy.position.set(x, y, z);
          dummy.updateMatrix();
          waterMesh.setMatrixAt(waterCount++, dummy.matrix);
        }
      }
    }
  }

  grassMesh.count = grassCount;
  dirtMesh.count = dirtCount;
  stoneMesh.count = stoneCount;
  waterMesh.count = waterCount;

  scene.add(grassMesh);
  scene.add(dirtMesh);
  scene.add(stoneMesh);
  scene.add(waterMesh);

  // --- Camera / Controls ---
  const euler = new THREE.Euler(0, 0, 0, 'YXZ');
  let isLocked = false;

  document.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
  });

  document.addEventListener('pointerlockchange', () => {
    isLocked = document.pointerLockElement === renderer.domElement;
    document.getElementById('info').style.display = isLocked ? 'none' : 'block';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isLocked) return;
    const sensitivity = 0.002;
    euler.y -= e.movementX * sensitivity;
    euler.x -= e.movementY * sensitivity;
    euler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, euler.x));
    camera.quaternion.setFromEuler(euler);
  });

  const keys = {};
  document.addEventListener('keydown', (e) => { keys[e.code] = true; });
  document.addEventListener('keyup', (e) => { keys[e.code] = false; });

  // --- Camera Position ---
  camera.position.set(WORLD_SIZE / 2, 10, WORLD_SIZE / 2);

  function getTerrainHeightAt(px, pz) {
    const gx = Math.floor(px);
    const gz = Math.floor(pz);
    if (gx < 0 || gx >= WORLD_SIZE || gz < 0 || gz >= WORLD_SIZE) return 0;
    return getHeight(gx, gz);
  }

  // --- Animation Loop ---
  const clock = new THREE.Clock();
  const moveSpeed = 6;
  const playerHeight = 1.7;

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (isLocked) {
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();

      const right = new THREE.Vector3();
      right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

      const move = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp']) move.add(forward);
      if (keys['KeyS'] || keys['ArrowDown']) move.sub(forward);
      if (keys['KeyA'] || keys['ArrowLeft']) move.sub(right);
      if (keys['KeyD'] || keys['ArrowRight']) move.add(right);

      if (move.length() > 0) {
        move.normalize().multiplyScalar(moveSpeed * dt);
        camera.position.add(move);
      }

      // Keep camera above terrain
      const terrainH = getTerrainHeightAt(camera.position.x, camera.position.z);
      const targetY = Math.max(terrainH + playerHeight, 2);
      camera.position.y += (targetY - camera.position.y) * 0.15;

      // Clamp to world bounds
      camera.position.x = Math.max(0.5, Math.min(WORLD_SIZE - 0.5, camera.position.x));
      camera.position.z = Math.max(0.5, Math.min(WORLD_SIZE - 0.5, camera.position.z));
    }

    renderer.render(scene, camera);
  }

  animate();

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
